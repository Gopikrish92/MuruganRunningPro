# Run in Admin PowerShell
Get-Process devenv, msbuild, dotnet, VBCSCompiler, IISExpress -ErrorAction SilentlyContinue |
  ForEach-Object { Stop-Process -Id $_.Id -Force -ErrorAction SilentlyContinue }

# ensure VS closed, then
rd /s /q .vs
# then
git rm -r --cached .vs
git add .gitignore
git commit -m "Remove .vs from repo and add to .gitignore"
git push